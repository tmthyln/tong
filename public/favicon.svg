<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="44%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#FDFAF4"/>
      <stop offset="100%" stop-color="#E6DDD0"/>
    </radialGradient>
  </defs>

  <!-- Background: warm paper-like rounded square -->
  <rect width="256" height="256" fill="url(#bg)" rx="40"/>
  <rect width="256" height="256" fill="none" stroke="#C8BBAA" stroke-width="1.5" rx="40"/>

  <!-- Knowledge graph: connections (behind nodes) -->
  <g stroke="#9B3232" fill="none">
    <!-- outer → inner spokes -->
    <line x1="40" y1="52"  x2="88"  y2="82"  stroke-width="1.3" stroke-opacity="0.22"/>
    <line x1="210" y1="44" x2="168" y2="78"  stroke-width="1.3" stroke-opacity="0.22"/>
    <line x1="240" y1="136" x2="188" y2="120" stroke-width="1.3" stroke-opacity="0.22"/>
    <line x1="218" y1="208" x2="174" y2="178" stroke-width="1.3" stroke-opacity="0.22"/>
    <line x1="40" y1="204" x2="82"  y2="176"  stroke-width="1.3" stroke-opacity="0.22"/>
    <line x1="22" y1="126" x2="74"  y2="116"  stroke-width="1.3" stroke-opacity="0.22"/>
    <!-- outer arc connections (sparse, constellation feel) -->
    <line x1="40" y1="52"  x2="22"  y2="126"  stroke-width="0.9" stroke-opacity="0.13"/>
    <line x1="210" y1="44" x2="240" y2="136"  stroke-width="0.9" stroke-opacity="0.13"/>
    <line x1="218" y1="208" x2="40" y2="204"  stroke-width="0.9" stroke-opacity="0.11"/>
    <!-- inner ring connections -->
    <line x1="88" y1="82"  x2="168" y2="78"   stroke-width="0.9" stroke-opacity="0.16"/>
    <line x1="188" y1="120" x2="174" y2="178" stroke-width="0.9" stroke-opacity="0.16"/>
    <line x1="82" y1="176" x2="74"  y2="116"  stroke-width="0.9" stroke-opacity="0.16"/>
  </g>

  <!-- Inner nodes (closer ring) -->
  <g fill="#A83232">
    <circle cx="88"  cy="82"  r="3.5" opacity="0.50"/>
    <circle cx="168" cy="78"  r="3.0" opacity="0.45"/>
    <circle cx="188" cy="120" r="3.5" opacity="0.50"/>
    <circle cx="174" cy="178" r="3.0" opacity="0.45"/>
    <circle cx="82"  cy="176" r="3.5" opacity="0.50"/>
    <circle cx="74"  cy="116" r="3.0" opacity="0.45"/>
  </g>

  <!-- Outer nodes (edge ring) -->
  <g fill="#C0392B">
    <circle cx="40"  cy="52"  r="5.0" opacity="0.65"/>
    <circle cx="210" cy="44"  r="4.5" opacity="0.60"/>
    <circle cx="240" cy="136" r="5.0" opacity="0.65"/>
    <circle cx="218" cy="208" r="4.5" opacity="0.60"/>
    <circle cx="40"  cy="204" r="5.0" opacity="0.65"/>
    <circle cx="22"  cy="126" r="4.5" opacity="0.60"/>
  </g>

  <!-- 通 character: calligraphic serif, dark ink -->
  <text
    x="128" y="128"
    font-family="'Noto Serif SC', 'STKaiti', 'KaiTi', 'FZKai-Z03', 'AR PL UKai CN', serif"
    font-size="156"
    font-weight="400"
    fill="#1A1830"
    text-anchor="middle"
    dominant-baseline="central">通</text>
</svg>
